services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/cert:/etc/nginx/cert:ro
      - ./docker/nginx/pwd/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - common
    env_file:
      - .env.docker

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: api
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - common
    depends_on:
      - redis
    env_file:
      - .env.docker

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - common
    env_file:
      - .env.docker

  worker:
    profiles: [worker]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: worker
    volumes:
      - ./:/var/www/html
    networks:
      - common
    restart: unless-stopped
    env_file:
      - .env.docker

  mysql:
    image: mysql:8
    profiles: [database]
    platform: linux/amd64
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravelpassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - common
    env_file:
      - .env.docker

  websocket:
    profiles: [websocket]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: websocket
    volumes:
      - ./:/var/www/html
    ports:
      - "${WS_PORT:-80}:8080"
    depends_on:
      - redis
    networks:
      - common
    restart: unless-stopped
    env_file:
      - .env.docker

  selenium:
    profiles: [selenium]
    image: selenium/standalone-chrome:latest
    shm_size: "2gb"
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      - VNC_PASSWORD=0000
    networks:
      - common
    env_file:
      - .env.docker

volumes:
  mysql_data:
  redis_data:

networks:
  common:
    name: ${DOCKER_NETWORK_NAME:-common}
    driver: bridge
